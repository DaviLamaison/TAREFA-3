<body>
  
  
  <h1>Cadastro de Participante</h1>

  <a href="#Informações Básicas">Informações Básicas</a>|
  <a href="#Preferências">Preferências</a>|
  <a href="#Observação">Observação</a>

  <br> <br>
  
  <fieldset>
    <legend id="Informações Básicas">Informações Básica</legend>

    <label>Nome Completo:</label>
      <br>
    <input type="text">
    
    <br>

    <label>E-mail:</label>
    <br>
    <input type="email">

    <br>

    <label for="CPF">CPF:</label> <br>
    <input type="text" pattern="\d{3}.\d{3}.\d{3}-\d{2}" minlength="14" maxlength="14"> 

    <br>

  </fieldset>

  <fieldset>
    <legend id="Preferências">Preferências</legend>
    <p>Escolha sua área de interesse</p>

    <input type="checkbox">
    <label>Inteligência Artificial</label>

    <br>

    <input type="checkbox">
    <label>Desenvolvimento Web</label>

    <br>

    <input type="checkbox">
    <label>Games</label>

    <br>

    <p>Selecione os tópicos adicionais desejados:</p>

    <input type="checkbox">
    <label>Machine Learning</label>

    <br>

    <input type="checkbox">
     <label>Cloud</label>

    <br>

    <input type="checkbox">
     <label>loT</label>

    <br>

  </fieldset>

<fieldset>
  <legend id="Observação">Observação</legend>
    <label></label>
      <textarea rows="10" cols="50"></textarea>
</fieldset>

<br>

<button type="submit">Enviar Cadastro</button>
